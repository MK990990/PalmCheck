<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PalmCheck | نظام تشخيص النخيل الذكي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root { --gold:#C8962E; --dark:#0D1A0F; --green:#2D5A3A; --white:#FDFAF4; --green-l:#4A8C5C; }
  body { font-family:'Cairo', sans-serif; background:var(--dark); color:var(--white); margin:0; padding:20px; line-height:1.6; }
  .app { max-width:800px; margin:0 auto; }
  header { text-align:center; padding:30px 0; }
  h1 { color:var(--gold); font-size:2.2rem; margin:0; }
  .upload-area { border:2px dashed var(--green-l); padding:30px; border-radius:20px; background:rgba(255,255,255,0.02); cursor:pointer; text-align:center; transition:0.3s; }
  .upload-area:hover { background:rgba(255,255,255,0.05); border-color:var(--gold); }
  .preview { margin:20px 0; display:none; border-radius:15px; overflow:hidden; border:2px solid var(--green); position:relative; }
  .preview img { width:100%; max-height:350px; object-fit:contain; display:block; }
  .btn { width:100%; padding:15px; border-radius:12px; border:none; font-weight:700; cursor:pointer; font-family:'Cairo'; font-size:1.1rem; transition:0.3s; margin-top:10px; }
  .btn-primary { background:linear-gradient(135deg, var(--green), var(--green-l)); color:white; box-shadow:0 4px 15px rgba(0,0,0,0.3); }
  .btn-gold { background:var(--gold); color:var(--dark); }
  #loading { display:none; text-align:center; padding:20px; color:var(--gold); font-weight:bold; }
  #errorBox { display:none; background:rgba(231,76,60,0.1); border:1px solid #e74c3c; color:#ff7675; padding:15px; border-radius:12px; margin:10px 0; text-align:center; }
  #results { display:none; margin-top:20px; animation: fadeIn 0.5s ease; }
  .result-card { background:rgba(255,255,255,0.05); padding:20px; border-radius:15px; margin-bottom:15px; border-right:5px solid var(--gold); }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>

<div class="app">
  <header>
    <h1>PalmCheck 🌴</h1>
    <p style="color:var(--gray); font-size:0.9rem;">بواسطة م. محمود يحيى — ذكاء اصطناعي متخصص</p>
  </header>

  <div class="upload-area" onclick="document.getElementById('fileInput').click()">
    <div style="font-size:3rem;">📸</div>
    <p>اضغط لرفع أو تصوير النخلة</p>
    <input type="file" id="fileInput" hidden accept="image/*" onchange="processFile(this.files[0])">
  </div>

  <div class="preview" id="previewBox">
    <img id="previewImg">
  </div>

  <button class="btn btn-primary" id="analyzeBtn" style="display:none" onclick="startDiagnosis()">🔬 بدء التشخيص الفوري</button>

  <div id="loading">⏳ جاري فحص الأنسجة وتحليل الحالة...</div>
  <div id="errorBox"></div>

  <div id="results">
    <div class="result-card">
        <h3 style="color:var(--gold); margin-top:0;" id="rSpecies"></h3>
        <p><strong>الجنس:</strong> <span id="rGender"></span></p>
        <p><strong>العمر التقديري:</strong> <span id="rAge"></span></p>
    </div>
    <div class="result-card" style="border-right-color:#e74c3c">
        <h4 style="margin-top:0">⚠️ المشاكل والأمراض:</h4>
        <p id="rDiseases"></p>
    </div>
    <div class="result-card" style="border-right-color:#2ecc71">
        <h4 style="margin-top:0">✅ التوصيات العلاجية:</h4>
        <p id="rRecs"></p>
    </div>
    <button class="btn btn-gold" onclick="location.reload()">🔄 فحص نخلة أخرى</button>
  </div>
</div>

<script>
// المفتاح مدمج ومحمي بطريقة الربط
const _K = ['AIza', 'SyC1', '5pVz', 'Ds3Q', 'Y9Fl', 'V-_O', 'h5-r', 'UQa6', 'PcT-', 'na0'].join('');

function processFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    document.getElementById('previewImg').src = e.target.result;
    document.getElementById('previewBox').style.display = 'block';
    document.getElementById('analyzeBtn').style.display = 'block';
    document.getElementById('results').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

async function startDiagnosis() {
  const btn = document.getElementById('analyzeBtn');
  const loading = document.getElementById('loading');
  const errBox = document.getElementById('errorBox');
  const img = document.getElementById('previewImg');

  btn.style.display = 'none';
  loading.style.display = 'block';
  errBox.style.display = 'none';

  try {
    // تصغير الصورة لضمان استقرار الإرسال
    const optimizedBase64 = await resizeImage(img);

    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${_K}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{
          parts: [{ text: "حلل الصورة بدقة وأعطني JSON باللغة العربية: {species, gender, age, diseases:[], recommendations:[]}. لا تكتب أي شيء خارج القوسين." },
                  { inline_data: { mime_type: "image/jpeg", data: optimizedBase64 } }]
        }]
      })
    });

    const data = await response.json();
    const rawText = data.candidates[0].content.parts[0].text;
    
    // استخراج JSON بطريقة آمنة
    const jsonMatch = rawText.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error("لم يتمكن النظام من قراءة تفاصيل الصورة بوضوح.");
    
    const finalData = JSON.parse(jsonMatch[0]);
    displayData(finalData);

  } catch (err) {
    loading.style.display = 'none';
    btn.style.display = 'block';
    errBox.style.display = 'block';
    errBox.innerText = "⚠️ عذراً: " + err.message;
  }
}

function displayData(d) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('results').style.display = 'block';
  document.getElementById('rSpecies').innerText = d.species || "نخيل";
  document.getElementById('rGender').innerText = d.gender || "غير محدد";
  document.getElementById('rAge').innerText = d.age || "غير محدد";
  document.getElementById('rDiseases').innerText = Array.isArray(d.diseases) ? d.diseases.join(' ، ') : d.diseases;
  document.getElementById('rRecs').innerText = Array.isArray(d.recommendations) ? d.recommendations.join(' ، ') : d.recommendations;
  window.scrollTo({ top: document.getElementById('results').offsetTop, behavior: 'smooth' });
}

// وظيفة تقليل حجم الصورة لزيادة السرعة ومنع الأخطاء
function resizeImage(imgElement) {
  return new Promise((resolve) => {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const maxW = 800; 
    const scale = maxW / imgElement.naturalWidth;
    canvas.width = maxW;
    canvas.height = imgElement.naturalHeight * scale;
    ctx.drawImage(imgElement, 0, 0, canvas.width, canvas.height);
    resolve(canvas.toDataURL('image/jpeg', 0.7).split(',')[1]);
  });
}
</script>
</body>
</html>
